{% if result.pages > 1 %}<nav class="pager">
  {% if result.page > 1 %}<a href="?q={{ q|urlencode }}&page={{ result.page - 1 }}">上一页</a>{% endif %}
  <span>第 {{ result.page }} / {{ result.pages }} 页，共 {{ result.total }} 条</span>
  {% if result.page < result.pages %}<a href="?q={{ q|urlencode }}&page={{ result.page + 1 }}">下一页</a>{% endif %}
</nav>{% endif %}
