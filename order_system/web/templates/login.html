{% extends "base.html" %}
{% block title %}登录 · TWD 订单系统{% endblock %}
{% block container_class %}login-wrap{% endblock %}
{% block content %}
<section class="login-card">
  <div class="login-mark">TWD</div>
  <h1>订单管理系统</h1>
  <p class="muted">请使用服务器管理员分配的账号登录</p>
  {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="stack">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label>用户名<input name="username" autocomplete="username" required autofocus></label>
    <label>密码<input type="password" name="password" autocomplete="current-password" required></label>
    <button class="primary" type="submit">登录</button>
  </form>
</section>
{% endblock %}
